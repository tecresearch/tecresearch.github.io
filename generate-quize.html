<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Quiz Generator</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: white; padding: 20px; margin: 10px 0; border-radius: 5px; }
        input, textarea, button { padding: 8px; margin: 5px; font-family: monospace; }
        input { width: 300px; }
        textarea { width: 100%; height: 80px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 8px 15px; }
        button:hover { background: #0056b3; }
        .question { border: 1px solid #ddd; margin: 10px 0; padding: 10px; background: #fafafa; }
        .correct { color: green; font-weight: bold; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2>🤖 Admin Quiz Generator</h2>
        <p><strong>API:</strong> ai.tecresearch.me/ai?q= | <strong>Save:</strong> biologylover.com/api/save/quize</p>
        <hr>
        
        <div>
            <label><strong>Number of Questions:</strong></label>
            <input type="number" id="numQuestions" value="3" min="1" max="20">
            
            <label><strong>Topic/Subject:</strong></label>
            <input type="text" id="topic" value="JavaScript basics" style="width: 200px;">
            
            <button id="generateBtn">🚀 Generate Quiz</button>
        </div>
        
        <div id="status" class="status" style="display:none"></div>
    </div>
    
    <div id="quizPanel" class="panel" style="display:none">
        <h3>📋 Generated Quiz Preview</h3>
        <div id="quizQuestions"></div>
        <button id="saveBtn" style="background: #28a745;">💾 Save to Database</button>
    </div>
    
    <div id="debugPanel" class="panel">
        <h4>🔧 Debug Info</h4>
        <pre id="debugLog">Ready...</pre>
    </div>
</div>

<script>
// ============================================================
// SIMPLE QUIZ GENERATOR - FOCUS ON LOGIC
// ============================================================

const AI_API = 'https://ai.tecresearch.me/ai?q=';
const SAVE_API = 'https://biologylover.com/api/save/quize';

let currentQuizJSON = null;  // Store parsed quiz JSON

function log(msg) {
    const debug = document.getElementById('debugLog');
    debug.textContent += '\n> ' + new Date().toLocaleTimeString() + ': ' + msg;
    debug.scrollTop = debug.scrollHeight;
    console.log(msg);
}

function showStatus(msg, isError = false) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = msg;
    statusDiv.className = 'status ' + (isError ? 'error' : 'success');
    statusDiv.style.display = 'block';
    setTimeout(() => statusDiv.style.display = 'none', 5000);
}

// ============================================================
// STEP 1: Build PROMPT with STRICT JSON INSTRUCTION
// ============================================================
function buildJSONPrompt(numQuestions, topic) {
    // Template instruction: API MUST return ONLY JSON, no extra text
    const template = {
        instruction: "You are a quiz generator. Return ONLY a valid JSON object. No explanations, no markdown, no extra text.",
        format: {
            quiz: [
                {
                    question: "string",
                    options: ["option1", "option2", "option3", "option4"],
                    answer: 0  // index of correct option (0-based)
                }
            ]
        },
        requirement: `Generate ${numQuestions} multiple choice questions about "${topic}". Each question must have exactly 4 options.`
    };
    
    // Convert to string and send as prompt
    const promptString = JSON.stringify(template);
    return promptString;
}

// ============================================================
// STEP 2: Call AI API
// ============================================================
async function callAIGenerate(numQuestions, topic) {
    const prompt = buildJSONPrompt(numQuestions, topic);
    const fullPrompt = `You are a quiz generator. Return ONLY a valid JSON object with quiz questions, options, and answers. No extra text. Format: {"quiz":[{"question":"...","options":["...","...","...","..."],"answer":0}]}. Generate ${numQuestions} questions about ${topic}.`;
    
    const encodedPrompt = encodeURIComponent(fullPrompt);
    const url = AI_API + encodedPrompt;
    
    log(`Calling API: ${url.substring(0, 150)}...`);
    
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const rawText = await response.text();
        log(`Raw API response length: ${rawText.length} chars`);
        log(`Raw response: ${rawText.substring(0, 500)}`);
        
        // Parse JSON from response
        let parsed = null;
        try {
            parsed = JSON.parse(rawText);
            log(`✓ Successfully parsed JSON`);
        } catch (e) {
            log(`✗ Failed to parse JSON: ${e.message}`);
            
            // Try to extract JSON if there's extra text
            const jsonMatch = rawText.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                try {
                    parsed = JSON.parse(jsonMatch[0]);
                    log(`✓ Extracted and parsed JSON from response`);
                } catch(e2) {
                    throw new Error(`Cannot parse JSON from API response`);
                }
            } else {
                throw new Error(`API did not return valid JSON`);
            }
        }
        
        // Check if parsed has quiz array
        let quizArray = null;
        if (parsed.quiz && Array.isArray(parsed.quiz)) {
            quizArray = parsed.quiz;
        } else if (Array.isArray(parsed)) {
            quizArray = parsed;
        } else if (parsed.questions && Array.isArray(parsed.questions)) {
            quizArray = parsed.questions;
        } else {
            // Try to create quiz from any array found
            for (let key in parsed) {
                if (Array.isArray(parsed[key]) && parsed[key].length > 0 && parsed[key][0].question) {
                    quizArray = parsed[key];
                    break;
                }
            }
        }
        
        if (!quizArray || quizArray.length === 0) {
            throw new Error(`No quiz questions found in API response`);
        }
        
        // Validate each question
        quizArray.forEach((q, idx) => {
            if (!q.question) q.question = `Question ${idx + 1}`;
            if (!q.options || q.options.length < 2) q.options = ["Option A", "Option B", "Option C", "Option D"];
            if (q.answer === undefined || q.answer === null) q.answer = 0;
            if (typeof q.answer === 'string') {
                // Convert letter to index
                const letter = q.answer.toUpperCase();
                if (letter >= 'A' && letter <= 'D') q.answer = letter.charCodeAt(0) - 65;
                else q.answer = 0;
            }
        });
        
        return quizArray;
        
    } catch (error) {
        log(`✗ Error: ${error.message}`);
        throw error;
    }
}

// ============================================================
// STEP 3: Display Quiz
// ============================================================
function displayQuiz(quizArray) {
    const container = document.getElementById('quizQuestions');
    container.innerHTML = '';
    
    quizArray.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'question';
        
        const correctOption = q.options[q.answer] || q.options[0];
        
        div.innerHTML = `
            <strong>Q${idx + 1}: ${escapeHtml(q.question)}</strong><br>
            ${q.options.map((opt, optIdx) => {
                const prefix = String.fromCharCode(65 + optIdx);
                const isCorrect = (optIdx === q.answer);
                return `<div style="margin-left: 20px; ${isCorrect ? 'color: green; font-weight: bold;' : ''}">
                    ${prefix}) ${escapeHtml(opt)} ${isCorrect ? '✓' : ''}
                </div>`;
            }).join('')}
            <div class="correct">📌 Correct Answer: ${String.fromCharCode(65 + q.answer)}</div>
        `;
        container.appendChild(div);
    });
    
    document.getElementById('quizPanel').style.display = 'block';
}

// ============================================================
// STEP 4: Save to Database
// ============================================================
async function saveToDatabase(quizArray, topic, numQuestions) {
    // Build the JSON object to send
    const saveObject = {
        quizId: `quiz_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`,
        topic: topic,
        totalQuestions: numQuestions,
        generatedAt: new Date().toISOString(),
        questions: quizArray.map((q, idx) => ({
            id: idx,
            question: q.question,
            options: q.options,
            correctAnswerIndex: q.answer,
            correctAnswerText: q.options[q.answer]
        })),
        metadata: {
            source: "ai.tecresearch.me",
            generator: "Admin Dashboard",
            userAgent: navigator.userAgent
        }
    };
    
    log(`Saving to ${SAVE_API}: ${JSON.stringify(saveObject, null, 2)}`);
    
    try {
        const response = await fetch(SAVE_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(saveObject)
        });
        
        if (response.ok) {
            const result = await response.json();
            log(`✓ Save successful: ${JSON.stringify(result)}`);
            showStatus(`✅ Quiz saved! ID: ${saveObject.quizId}`, false);
        } else if (response.status === 404) {
            log(`⚠️ Save endpoint not found (404) - Data logged to console`);
            showStatus(`⚠️ Save endpoint not ready. Quiz data logged to console.`, true);
            console.log('📦 QUIZ DATA (ready to save):', saveObject);
        } else {
            throw new Error(`HTTP ${response.status}`);
        }
    } catch (error) {
        log(`✗ Save failed: ${error.message}`);
        showStatus(`❌ Save failed: ${error.message}. Check console.`, true);
        console.log('📦 QUIZ DATA (would save):', saveObject);
    }
}

// ============================================================
// STEP 5: Main Flow
// ============================================================
async function generateAndDisplay() {
    const numQuestions = parseInt(document.getElementById('numQuestions').value);
    const topic = document.getElementById('topic').value.trim();
    
    if (!topic) {
        showStatus('Please enter a topic', true);
        return;
    }
    
    const generateBtn = document.getElementById('generateBtn');
    generateBtn.disabled = true;
    generateBtn.textContent = '⏳ Generating...';
    
    showStatus(`Generating ${numQuestions} questions about "${topic}"...`, false);
    log(`Starting quiz generation: ${numQuestions} questions on "${topic}"`);
    
    try {
        const quizArray = await callAIGenerate(numQuestions, topic);
        log(`✓ Generated ${quizArray.length} questions successfully`);
        
        displayQuiz(quizArray);
        currentQuizJSON = quizArray;
        
        showStatus(`✅ Generated ${quizArray.length} questions!`, false);
        
        // Setup save button
        const saveBtn = document.getElementById('saveBtn');
        const newSaveBtn = saveBtn.cloneNode(true);
        saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
        newSaveBtn.addEventListener('click', () => {
            saveToDatabase(currentQuizJSON, topic, numQuestions);
        });
        
    } catch (error) {
        log(`✗ Generation failed: ${error.message}`);
        showStatus(`❌ Error: ${error.message}. Check debug panel.`, true);
        document.getElementById('quizPanel').style.display = 'none';
    } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '🚀 Generate Quiz';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Event listeners
document.getElementById('generateBtn').addEventListener('click', generateAndDisplay);

log('Admin Quiz Generator Ready');
log(`AI API: ${AI_API}`);
log(`Save API: ${SAVE_API}`);
</script>
</body>
</html>
