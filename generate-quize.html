<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator | Powered by tecresearch API</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .quiz-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1.5rem 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            margin: 0.5rem 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .api-input-area {
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .quiz-body {
            padding: 2rem;
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .question-counter, .score-badge {
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .question-counter {
            background: #eef2ff;
            color: #1e40af;
        }

        .score-badge {
            background: #f1f5f9;
            color: #0f172a;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 1rem 0 1.5rem;
            color: #0f172a;
            line-height: 1.3;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .option {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateX(4px);
        }

        .option.selected {
            background: #eef2ff;
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102,126,234,0.2);
        }

        .option-prefix {
            font-weight: 700;
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #cbd5e1;
            color: #1e293b;
        }

        .option.selected .option-prefix {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            background: #1e293b;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #0f172a;
            transform: scale(0.98);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 100%;
            margin-top: 1.5rem;
        }

        .result-area {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .restart-btn {
            background: #0f172a;
            margin-top: 1rem;
        }

        .comment-block {
            background: #fef9e3;
            border-left: 4px solid #eab308;
            padding: 0.75rem;
            font-size: 0.75rem;
            color: #713f12;
            margin-top: 1.5rem;
            border-radius: 8px;
            font-family: monospace;
        }

        .error-message {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 1rem;
            border-radius: 0.5rem;
            color: #991b1b;
            margin-top: 1rem;
        }

        .success-message {
            background: #dcfce7;
            border-left: 4px solid #22c55e;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: #166534;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            padding: 1rem;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="quiz-card">
        <div class="header">
            <h1>
                <span>🤖</span> AI Quiz Generator
            </h1>
            <p>Powered by tecresearch.ai API | Enter any topic to generate an interactive quiz</p>
        </div>

        <div class="api-input-area">
            <div class="input-group">
                <input type="text" id="promptInput" placeholder="e.g., 'Generate a 5-question quiz about JavaScript basics' or 'Create quiz on World War II'" value="Generate a 5-question multiple choice quiz about Python programming with 4 options each">
                <button id="generateBtn" class="generate-btn">🎯 Generate Quiz</button>
            </div>
        </div>

        <div id="quizContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Enter a prompt above and click Generate to start!</p>
            </div>
        </div>
    </div>
    <footer>
        🔌 API Endpoint: ai.tecresearch.me/ai?q= | 💾 Saves results to /api/save/quize
    </footer>
</div>

<script>
    // API Configuration
    const API_BASE_URL = 'https://ai.tecresearch.me/ai?q=';
    const SAVE_ENDPOINT = '/api/save/quize';
    
    // Quiz state
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let userAnswers = [];
    let quizFinished = false;
    let finalScore = 0;
    let currentPrompt = '';

    // DOM elements
    const quizContent = document.getElementById('quizContent');
    const generateBtn = document.getElementById('generateBtn');
    const promptInput = document.getElementById('promptInput');

    // Helper: Call API to generate quiz
    async function generateQuizFromAPI(prompt) {
        try {
            showLoading(true);
            
            const encodedPrompt = encodeURIComponent(prompt);
            const apiUrl = `${API_BASE_URL}${encodedPrompt}`;
            
            console.log('Calling API:', apiUrl);
            
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                throw new Error(`API returned status ${response.status}`);
            }
            
            const data = await response.text();
            
            console.log('API Response:', data);
            
            const parsedQuestions = parseQuizFromResponse(data, prompt);
            
            if (parsedQuestions.length === 0) {
                throw new Error('Could not parse quiz questions from API response. Make sure the API returns questions in a readable format.');
            }
            
            currentQuestions = parsedQuestions;
            currentQuestionIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            quizFinished = false;
            
            renderQuizInterface();
            
        } catch (error) {
            console.error('Error generating quiz:', error);
            showError(`Failed to generate quiz: ${error.message}. Please check your API endpoint and try again.`);
        } finally {
            showLoading(false);
        }
    }
    
    // Parse quiz from API response
    function parseQuizFromResponse(apiResponse, originalPrompt) {
        const questions = [];
        
        // Try to parse as JSON first
        try {
            const jsonData = JSON.parse(apiResponse);
            if (Array.isArray(jsonData)) {
                return jsonData;
            } else if (jsonData.questions && Array.isArray(jsonData.questions)) {
                return jsonData.questions;
            }
        } catch (e) {
            // Not JSON, continue with text parsing
        }
        
        // Parse text response - look for question patterns
        const lines = apiResponse.split('\n');
        let currentQuestion = null;
        let currentOptions = [];
        let collectingOptions = false;
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            const questionMatch = line.match(/^\d+[\.\)]\s*(.+)/) || 
                                 (line.includes('?') && !line.match(/^[A-D]\)/i) && !line.match(/^[A-D]\./i));
            
            if (questionMatch && !collectingOptions) {
                if (currentQuestion && currentOptions.length > 0) {
                    questions.push({
                        question: currentQuestion,
                        options: [...currentOptions],
                        answer: 0
                    });
                }
                currentQuestion = questionMatch[1] || line;
                currentOptions = [];
                collectingOptions = true;
            }
            else if (collectingOptions && (line.match(/^[A-D][\.\)]\s*(.+)/i) || line.match(/^[A-D]\)/i))) {
                const optionMatch = line.match(/^[A-D][\.\)]\s*(.+)/i);
                if (optionMatch) {
                    currentOptions.push(optionMatch[1]);
                }
            }
            else if (line.toLowerCase().includes('answer:') || line.toLowerCase().includes('correct:')) {
                const answerMatch = line.match(/answer:\s*([A-D])/i);
                if (answerMatch && currentQuestion && currentOptions.length > 0) {
                    const answerLetter = answerMatch[1].toUpperCase();
                    const answerIndex = answerLetter.charCodeAt(0) - 65;
                    if (answerIndex >= 0 && answerIndex < currentOptions.length) {
                        if (questions.length > 0) {
                            questions[questions.length - 1].answer = answerIndex;
                        }
                    }
                }
            }
        }
        
        if (currentQuestion && currentOptions.length > 0) {
            questions.push({
                question: currentQuestion,
                options: currentOptions,
                answer: 0
            });
        }
        
        if (questions.length === 0) {
            console.log('Could not parse questions, creating sample quiz');
            return createSampleQuiz(originalPrompt);
        }
        
        return questions;
    }
    
    function createSampleQuiz(topic) {
        return [
            {
                question: `What is the main topic of "${topic.substring(0, 50)}"?`,
                options: ["Topic A", "Topic B", "Topic C", "Topic D"],
                answer: 0
            },
            {
                question: "Which of the following is correct?",
                options: ["Option 1", "Option 2", "Option 3", "Option 4"],
                answer: 1
            }
        ];
    }
    
    // Save quiz results to database
    async function saveQuizResultsToDatabase() {
        // Prepare the JSON object to send
        const quizResults = {
            prompt: currentPrompt,
            timestamp: new Date().toISOString(),
            totalQuestions: currentQuestions.length,
            score: finalScore,
            percentage: ((finalScore / currentQuestions.length) * 100).toFixed(2),
            userAnswers: userAnswers.map((answer, idx) => ({
                questionIndex: idx,
                question: currentQuestions[idx].question,
                selectedAnswer: currentQuestions[idx].options[answer],
                selectedAnswerIndex: answer,
                correctAnswer: currentQuestions[idx].options[currentQuestions[idx].answer],
                correctAnswerIndex: currentQuestions[idx].answer,
                isCorrect: answer === currentQuestions[idx].answer
            })),
            questions: currentQuestions.map((q, idx) => ({
                index: idx,
                question: q.question,
                options: q.options,
                correctAnswerIndex: q.answer,
                correctAnswerText: q.options[q.answer]
            })),
            metadata: {
                userAgent: navigator.userAgent,
                timestamp: new Date().toISOString(),
                quizId: `quiz_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
            }
        };
        
        console.log('Saving to database:', quizResults);
        
        try {
            const response = await fetch(SAVE_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(quizResults)
            });
            
            if (response.ok) {
                const result = await response.json();
                console.log('Successfully saved to database:', result);
                return { success: true, data: result };
            } else {
                console.error('Failed to save to database:', response.status, response.statusText);
                return { success: false, error: `HTTP ${response.status}: ${response.statusText}` };
            }
        } catch (error) {
            console.error('Error saving to database:', error);
            return { success: false, error: error.message };
        }
    }
    
    function renderQuizInterface() {
        if (quizFinished) {
            renderResults();
        } else {
            renderCurrentQuestion();
        }
    }
    
    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            quizContent.innerHTML = '<div class="error-message">No questions available. Please generate a new quiz.</div>';
            return;
        }
        
        const question = currentQuestions[currentQuestionIndex];
        const selectedIdx = userAnswers[currentQuestionIndex];
        const total = currentQuestions.length;
        const answeredCount = userAnswers.filter(a => a !== null).length;
        
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
        
        question.options.forEach((opt, idx) => {
            const isSelected = selectedIdx === idx;
            optionsHtml += `
                <div class="option ${isSelected ? 'selected' : ''}" data-opt-index="${idx}">
                    <span class="option-prefix">${letters[idx] || (idx + 1)}</span>
                    <span class="option-text">${escapeHtml(opt)}</span>
                </div>
            `;
        });
        
        const html = `
            <div class="quiz-body">
                <div class="progress-area">
                    <span class="question-counter">Question ${currentQuestionIndex + 1} / ${total}</span>
                    <span class="score-badge">✅ Answered: ${answeredCount}/${total}</span>
                </div>
                <div class="question-text">${escapeHtml(question.question)}</div>
                <div class="options-list" id="optionsList">
                    ${optionsHtml}
                </div>
                <div class="navigation">
                    <button id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                    <button id="nextBtn" ${currentQuestionIndex === total - 1 ? 'disabled' : ''}>Next ▶</button>
                </div>
                <button id="submitQuizBtn" class="submit-btn" ${answeredCount !== total ? 'disabled' : ''}>
                    📊 Submit Quiz & Save Results
                </button>
                <div class="comment-block">
                    💡 <strong>Quiz generated via API:</strong> ${escapeHtml(currentPrompt)}<br>
                    💾 <strong>Auto-save:</strong> Results will be automatically saved to <strong>/api/save/quize</strong> when you submit the quiz
                </div>
            </div>
        `;
        
        quizContent.innerHTML = html;
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const idx = parseInt(opt.dataset.optIndex);
                if (!isNaN(idx) && !quizFinished) {
                    userAnswers[currentQuestionIndex] = idx;
                    renderCurrentQuestion();
                }
            });
        });
        
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderCurrentQuestion();
            }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentQuestionIndex < total - 1) {
                currentQuestionIndex++;
                renderCurrentQuestion();
            }
        });
        
        document.getElementById('submitQuizBtn')?.addEventListener('click', async () => {
            if (userAnswers.every(a => a !== null)) {
                await calculateAndShowResults();
            } else {
                alert('Please answer all questions before submitting.');
            }
        });
    }
    
    async function calculateAndShowResults() {
        let correctCount = 0;
        for (let i = 0; i < currentQuestions.length; i++) {
            if (userAnswers[i] === currentQuestions[i].answer) {
                correctCount++;
            }
        }
        finalScore = correctCount;
        
        // Show saving indicator
        const submitBtn = document.getElementById('submitQuizBtn');
        if (submitBtn) {
            submitBtn.textContent = '💾 Saving Results...';
            submitBtn.disabled = true;
        }
        
        // Save to database
        const saveResult = await saveQuizResultsToDatabase();
        
        quizFinished = true;
        
        if (saveResult.success) {
            renderResults(true);
        } else {
            renderResults(false, saveResult.error);
        }
    }
    
    function renderResults(saveSuccess = true, errorMessage = null) {
        const total = currentQuestions.length;
        const percentage = (finalScore / total) * 100;
        let gradeMessage = percentage >= 80 ? '🌟 Excellent!' : percentage >= 60 ? '👍 Good job!' : '📚 Keep practicing!';
        
        let reviewHtml = '';
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            const isCorrect = userAnswers[i] === q.answer;
            reviewHtml += `
                <div style="margin-bottom: 1rem; padding: 0.75rem; border-left: 4px solid ${isCorrect ? '#22c55e' : '#ef4444'}; background: white; border-radius: 0.5rem;">
                    <div style="font-weight: 600;">${escapeHtml(q.question)}</div>
                    <div style="font-size: 0.85rem; margin-top: 0.5rem;">
                        Your answer: ${escapeHtml(q.options[userAnswers[i]])} ${isCorrect ? '✓' : '✗'}<br>
                        ${!isCorrect ? `Correct answer: ${escapeHtml(q.options[q.answer])}` : ''}
                    </div>
                </div>
            `;
        }
        
        const saveStatusHtml = saveSuccess 
            ? '<div class="success-message">✅ Quiz results successfully saved to /api/save/quize!</div>'
            : `<div class="error-message">❌ Failed to save to database: ${escapeHtml(errorMessage || 'Unknown error')}<br>Check console for details.</div>`;
        
        const html = `
            <div class="quiz-body">
                <div class="result-area">
                    <h2>📊 Quiz Complete!</h2>
                    <div style="font-size: 2.5rem; font-weight: 700;">${finalScore} / ${total}</div>
                    <div style="font-size: 1.2rem; margin: 0.5rem 0;">${percentage.toFixed(1)}% - ${gradeMessage}</div>
                    ${saveStatusHtml}
                    <button id="restartBtn" class="restart-btn">🔄 Generate New Quiz</button>
                </div>
                <details style="margin-top: 1.5rem;">
                    <summary style="font-weight: 600; cursor: pointer; padding: 0.5rem;">🔍 Review Your Answers</summary>
                    <div style="margin-top: 1rem; max-height: 400px; overflow-y: auto;">
                        ${reviewHtml}
                    </div>
                </details>
                <div class="comment-block">
                    📝 <strong>JSON Object Sent to /api/save/quize:</strong><br>
                    <pre style="background: #f1f5f9; padding: 0.5rem; border-radius: 0.25rem; overflow-x: auto; font-size: 0.7rem;">${JSON.stringify({
                        prompt: currentPrompt,
                        totalQuestions: total,
                        score: finalScore,
                        percentage: percentage.toFixed(2),
                        timestamp: new Date().toISOString()
                    }, null, 2)}</pre>
                </div>
            </div>
        `;
        
        quizContent.innerHTML = html;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            promptInput.value = currentPrompt;
            generateQuizFromAPI(currentPrompt);
        });
    }
    
    function showLoading(show) {
        if (show) {
            quizContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>🤖 Generating your quiz from AI API...</p>
                    <p style="font-size: 0.85rem; margin-top: 0.5rem;">This may take a few seconds</p>
                </div>
            `;
        }
    }
    
    function showError(message) {
        quizContent.innerHTML = `
            <div class="quiz-body">
                <div class="error-message">
                    <strong>⚠️ Error</strong><br>
                    ${escapeHtml(message)}<br><br>
                    <button onclick="location.reload()" style="background: #667eea; margin-top: 0.5rem;">Try Again</button>
                </div>
            </div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event listeners
    generateBtn.addEventListener('click', () => {
        const prompt = promptInput.value.trim();
        if (!prompt) {
            alert('Please enter a prompt to generate a quiz');
            return;
        }
        currentPrompt = prompt;
        generateQuizFromAPI(prompt);
    });
    
    promptInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            generateBtn.click();
        }
    });
</script>
</body>
</html>
