<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Quiz Generator</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: white; padding: 20px; margin: 10px 0; border-radius: 5px; }
        input, button { padding: 8px; margin: 5px; font-family: monospace; }
        input { width: 200px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 8px 15px; }
        button:hover { background: #0056b3; }
        .question { border: 1px solid #ddd; margin: 10px 0; padding: 10px; background: #fafafa; }
        .correct { color: green; font-weight: bold; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; font-size: 12px; max-height: 400px; }
        hr { margin: 20px 0; }
        .save-btn { background: #28a745; }
        .save-btn:hover { background: #218838; }
        .raw-response { font-size: 11px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2>🤖 Admin Quiz Generator</h2>
        <p><strong>AI API:</strong> ai.tecresearch.me | <strong>Save Endpoint:</strong> biologylover.com/api/save/quize</p>
        <hr>
        
        <div>
            <label><strong>Questions:</strong></label>
            <input type="number" id="numQuestions" value="3" min="1" max="20" style="width: 60px;">
            
            <label><strong>Topic:</strong></label>
            <input type="text" id="topic" value="JavaScript basics" style="width: 200px;">
            
            <button id="generateBtn">🚀 Generate Quiz</button>
        </div>
        
        <div id="status" style="display:none"></div>
    </div>
    
    <div id="quizPanel" class="panel" style="display:none">
        <h3>📋 Quiz Preview</h3>
        <div id="quizQuestions"></div>
        <button id="saveBtn" class="save-btn">💾 Save to Database</button>
    </div>
    
    <div class="panel">
        <h4>🔧 Debug & Raw Response</h4>
        <details>
            <summary>📄 View Raw API Response (click to expand)</summary>
            <pre id="rawResponseDisplay" style="background:#f0f0f0; max-height:200px;">No response yet</pre>
        </details>
        <details>
            <summary>📝 Debug Log</summary>
            <pre id="debugLog">Ready...</pre>
        </details>
    </div>
</div>

<script>
// ============================================================
// QUIZ GENERATOR WITH RESPONSE CLEANER
// ============================================================

const AI_API = 'https://ai.tecresearch.me/ai?q=';
const SAVE_API = 'https://biologylover.com/api/save/quize';

let currentQuiz = null;
let currentTopic = '';
let currentCount = 0;

function log(msg) {
    const debug = document.getElementById('debugLog');
    debug.textContent += '\n> ' + new Date().toLocaleTimeString() + ': ' + msg;
    debug.scrollTop = debug.scrollHeight;
    console.log(msg);
}

function showStatus(msg, isError = false) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = msg;
    statusDiv.className = isError ? 'error' : 'success';
    statusDiv.style.display = 'block';
    setTimeout(() => statusDiv.style.display = 'none', 5000);
}

// ============================================================
// CLEAN RESPONSE - REMOVE ANY EXPLANATIONS, GET ONLY JSON
// ============================================================
function cleanAndExtractJSON(rawText) {
    log("Cleaning response - removing explanations...");
    
    let cleaned = rawText.trim();
    
    // Display raw for debugging
    document.getElementById('rawResponseDisplay').textContent = cleaned;
    
    // Step 1: Try to find JSON object pattern { ... }
    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
        throw new Error("No JSON object found in response");
    }
    
    let jsonStr = jsonMatch[0];
    log(`Extracted JSON candidate (first 200 chars): ${jsonStr.substring(0, 200)}`);
    
    // Step 2: Try to parse the extracted JSON
    let parsed;
    try {
        parsed = JSON.parse(jsonStr);
        log("✓ Successfully parsed extracted JSON");
    } catch(e) {
        log(`✗ First parse failed: ${e.message}`);
        
        // Step 3: If it's a string inside, try to extract inner JSON
        if (typeof parsed === 'string') {
            try {
                parsed = JSON.parse(parsed);
                log("✓ Parsed inner JSON string");
            } catch(e2) {
                // Look for nested JSON in result field
                const innerMatch = jsonStr.match(/"result"\s*:\s*"([\s\S]*?)"/);
                if (innerMatch) {
                    let innerStr = innerMatch[1].replace(/\\n/g, '').replace(/\\"/g, '"');
                    try {
                        parsed = JSON.parse(innerStr);
                        log("✓ Extracted and parsed 'result' field JSON");
                    } catch(e3) {
                        throw new Error("Cannot extract valid JSON from response");
                    }
                } else {
                    throw new Error("No valid JSON structure found");
                }
            }
        } else {
            throw e;
        }
    }
    
    // Step 4: If parsed has result field that's a string, parse it
    if (parsed.result && typeof parsed.result === 'string') {
        log("Found 'result' field as string, parsing inner JSON...");
        try {
            parsed = JSON.parse(parsed.result);
            log("✓ Parsed result field successfully");
        } catch(e) {
            log(`Failed to parse result field: ${e.message}`);
        }
    }
    
    return parsed;
}

// ============================================================
// EXTRACT QUIZ FROM PARSED JSON
// ============================================================
function extractQuizFromJSON(parsedJson) {
    log("Extracting quiz array from parsed JSON...");
    
    let quizArray = null;
    
    // Try different possible structures
    if (parsedJson.quiz && Array.isArray(parsedJson.quiz)) {
        quizArray = parsedJson.quiz;
        log(`✓ Found quiz array with ${quizArray.length} questions`);
    } 
    else if (Array.isArray(parsedJson)) {
        quizArray = parsedJson;
        log(`✓ Found direct array with ${quizArray.length} items`);
    }
    else if (parsedJson.questions && Array.isArray(parsedJson.questions)) {
        quizArray = parsedJson.questions;
        log(`✓ Found questions array with ${quizArray.length} items`);
    }
    else {
        // Search for any array property that contains questions
        for (let key in parsedJson) {
            if (Array.isArray(parsedJson[key]) && parsedJson[key].length > 0) {
                const firstItem = parsedJson[key][0];
                if (firstItem && (firstItem.question || firstItem.options)) {
                    quizArray = parsedJson[key];
                    log(`✓ Found quiz array in property '${key}' with ${quizArray.length} items`);
                    break;
                }
            }
        }
    }
    
    if (!quizArray || quizArray.length === 0) {
        throw new Error("No quiz questions found in cleaned JSON");
    }
    
    // Normalize each question
    const normalized = quizArray.map((q, idx) => {
        let questionText = q.question || q.text || q.q || `Question ${idx + 1}`;
        let options = q.options || q.choices || q.answers || ["Option A", "Option B", "Option C", "Option D"];
        
        // Find correct answer index
        let correctIndex = -1;
        
        if (q.correct_answer !== undefined) {
            if (typeof q.correct_answer === 'number') {
                correctIndex = q.correct_answer;
            } else if (typeof q.correct_answer === 'string') {
                // Try to find by text
                correctIndex = options.findIndex(opt => opt === q.correct_answer);
                if (correctIndex === -1) {
                    // Try case-insensitive
                    correctIndex = options.findIndex(opt => 
                        opt.toLowerCase() === q.correct_answer.toLowerCase()
                    );
                }
                // Try letter match
                if (correctIndex === -1 && q.correct_answer.match(/^[A-D]$/i)) {
                    correctIndex = q.correct_answer.toUpperCase().charCodeAt(0) - 65;
                }
            }
        } else if (q.answer !== undefined) {
            if (typeof q.answer === 'number') {
                correctIndex = q.answer;
            } else if (typeof q.answer === 'string') {
                correctIndex = options.findIndex(opt => opt === q.answer);
                if (correctIndex === -1 && q.answer.match(/^[A-D]$/i)) {
                    correctIndex = q.answer.toUpperCase().charCodeAt(0) - 65;
                }
            }
        } else if (q.correct !== undefined) {
            correctIndex = typeof q.correct === 'number' ? q.correct : 0;
        }
        
        if (correctIndex === -1) correctIndex = 0;
        
        return {
            question: questionText,
            options: options,
            answer: correctIndex
        };
    });
    
    log(`✓ Normalized ${normalized.length} questions`);
    return normalized;
}

// ============================================================
// BUILD PROMPT - STRICT JSON INSTRUCTION
// ============================================================
function buildPrompt(numQuestions, topic) {
    return `Generate ${numQuestions} multiple choice questions about ${topic}. 
CRITICAL INSTRUCTIONS:
1. Return ONLY a valid JSON object
2. NO explanations, NO markdown, NO additional text
3. Use this exact structure:
{
  "quiz": [
    {
      "question": "question text",
      "options": ["option1", "option2", "option3", "option4"],
      "correct_answer": "exact text of correct option"
    }
  ]
}
Start your response with { and end with }. Do not add any text before or after.`;
}

// ============================================================
// CALL AI API WITH CLEANING
// ============================================================
async function callAIGenerate(numQuestions, topic) {
    const prompt = buildPrompt(numQuestions, topic);
    const encodedPrompt = encodeURIComponent(prompt);
    const url = AI_API + encodedPrompt;
    
    log(`Calling API with prompt length: ${prompt.length} chars`);
    
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const rawText = await response.text();
    log(`Raw response length: ${rawText.length} chars`);
    
    // Clean and extract JSON
    const cleanedJson = cleanAndExtractJSON(rawText);
    log(`Cleaned JSON type: ${typeof cleanedJson}`);
    
    // Extract quiz array
    const quiz = extractQuizFromJSON(cleanedJson);
    return quiz;
}

// ============================================================
// DISPLAY QUIZ
// ============================================================
function displayQuiz(quizArray) {
    const container = document.getElementById('quizQuestions');
    container.innerHTML = '';
    
    quizArray.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'question';
        
        const correctLetter = String.fromCharCode(65 + q.answer);
        const correctText = q.options[q.answer];
        
        div.innerHTML = `
            <strong>Q${idx + 1}: ${escapeHtml(q.question)}</strong><br>
            ${q.options.map((opt, optIdx) => {
                const prefix = String.fromCharCode(65 + optIdx);
                const isCorrect = (optIdx === q.answer);
                return `<div style="margin-left: 20px; ${isCorrect ? 'color: green; font-weight: bold;' : ''}">
                    ${prefix}) ${escapeHtml(opt)} ${isCorrect ? '✓' : ''}
                </div>`;
            }).join('')}
            <div class="correct">✅ Correct Answer: ${correctLetter}) ${escapeHtml(correctText)}</div>
        `;
        container.appendChild(div);
    });
    
    document.getElementById('quizPanel').style.display = 'block';
}

// ============================================================
// SAVE TO DATABASE
// ============================================================
async function saveToDatabase(quizArray, topic, numQuestions) {
    const saveObject = {
        quizId: `quiz_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`,
        topic: topic,
        totalQuestions: numQuestions,
        generatedAt: new Date().toISOString(),
        questions: quizArray.map((q, idx) => ({
            id: idx,
            question: q.question,
            options: q.options,
            correctAnswerIndex: q.answer,
            correctAnswerText: q.options[q.answer]
        })),
        metadata: {
            source: "ai.tecresearch.me",
            generator: "Admin Dashboard",
            timestamp: new Date().toISOString()
        }
    };
    
    log(`Saving to ${SAVE_API}...`);
    
    try {
        const response = await fetch(SAVE_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(saveObject)
        });
        
        if (response.ok) {
            const result = await response.json();
            log(`✓ Save successful`);
            showStatus(`✅ Quiz saved! ID: ${saveObject.quizId}`, false);
        } else if (response.status === 404) {
            log(`⚠️ Save endpoint not found (404)`);
            showStatus(`⚠️ Save endpoint not ready. Quiz data in console.`, true);
            console.log('📦 QUIZ DATA READY FOR SAVE:', saveObject);
        } else {
            throw new Error(`HTTP ${response.status}`);
        }
    } catch (error) {
        log(`✗ Save failed: ${error.message}`);
        showStatus(`❌ Save failed: ${error.message}`, true);
        console.log('📦 QUIZ DATA (would save):', saveObject);
    }
}

// ============================================================
// MAIN FLOW
// ============================================================
async function generateAndDisplay() {
    const numQuestions = parseInt(document.getElementById('numQuestions').value);
    const topic = document.getElementById('topic').value.trim();
    
    if (!topic) {
        showStatus('Please enter a topic', true);
        return;
    }
    
    currentTopic = topic;
    currentCount = numQuestions;
    
    const generateBtn = document.getElementById('generateBtn');
    generateBtn.disabled = true;
    generateBtn.textContent = '⏳ Generating...';
    
    showStatus(`Generating ${numQuestions} questions about "${topic}"...`, false);
    log(`=== Starting generation ===`);
    
    try {
        const quizArray = await callAIGenerate(numQuestions, topic);
        log(`✓ Successfully generated ${quizArray.length} questions`);
        
        displayQuiz(quizArray);
        currentQuiz = quizArray;
        
        showStatus(`✅ Generated ${quizArray.length} questions!`, false);
        
        // Setup save button
        const saveBtn = document.getElementById('saveBtn');
        const newSaveBtn = saveBtn.cloneNode(true);
        saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
        newSaveBtn.addEventListener('click', () => {
            saveToDatabase(currentQuiz, currentTopic, currentCount);
        });
        
    } catch (error) {
        log(`✗ Generation failed: ${error.message}`);
        showStatus(`❌ Error: ${error.message}`, true);
        document.getElementById('quizPanel').style.display = 'none';
    } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '🚀 Generate Quiz';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Event listeners
document.getElementById('generateBtn').addEventListener('click', generateAndDisplay);

log('Admin Quiz Generator Ready - with Response Cleaner');
log(`AI API: ${AI_API}`);
log(`Save API: ${SAVE_API}`);
</script>
</body>
</html>
